<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Contact Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Auth Page Specific Styles */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 2rem;
        }
        
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        
        .auth-header {
            background: var(--primary-gradient);
            padding: 2rem;
            text-align: center;
            color: var(--text-light);
        }
        
        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-header p {
            opacity: 0.9;
            margin-bottom: 0;
        }
        
        .auth-body {
            padding: 2rem;
        }
        
        .form-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            z-index: 10;
        }
        
        .form-control-with-icon {
            padding-left: 2.75rem;
        }
        
        .auth-btn {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .auth-divider span {
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .auth-footer {
            text-align: center;
            padding: 1rem 2rem 2rem;
            color: var(--text-secondary);
        }
        
        .auth-footer a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        
        .auth-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .password-toggle {
            position: absolute;
            right: 2.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            z-index: 10;
            padding: 0;
        }
        
        .password-toggle:hover {
            color: var(--text-primary);
        }
        
        .input-group {
            position: relative;
        }
        
        .validation-feedback {
            display: block;
            font-size: 0.8rem;
            color: #eb3349;
            margin-top: 0.25rem;
        }
        
        .form-control.is-invalid {
            border-color: #eb3349;
        }
        
        .form-control.is-invalid:focus {
            box-shadow: 0 0 0 3px rgba(235, 51, 73, 0.15);
        }
        
        /* Password strength indicator */
        .password-strength {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        /* Loading state */
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .btn-loading .btn-text {
            display: none;
        }
        
        .btn-loading .spinner-border {
            display: inline-block !important;
        }
        
        .spinner-border-sm {
            display: none;
            width: 1rem;
            height: 1rem;
            border-width: 2px;
        }
        
        /* Success state */
        .input-group-text-success {
            background-color: rgba(17, 153, 142, 0.1);
            border-color: #11998e;
            color: #11998e;
        }
        
        .input-group-text-error {
            background-color: rgba(235, 51, 73, 0.1);
            border-color: #eb3349;
            color: #eb3349;
        }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-page">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <i class="bi bi-person-plus-fill" style="font-size: 2.5rem; margin-bottom: 0.5rem; display: block;"></i>
                <h1>Create Account</h1>
                <p>Join us and start managing your contacts</p>
            </div>
            
            <!-- Register Form -->
            <div class="auth-body">
                <form id="registerForm" novalidate>
                    <!-- Username Field -->
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <div class="input-group">
                            <span class="form-icon">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" 
                                   class="form-control form-control-with-icon" 
                                   id="username" 
                                   placeholder="Choose a username"
                                   required
                                   autocomplete="username">
                        </div>
                        <div class="form-text">3-20 characters, letters, numbers, and underscores only</div>
                        <div class="invalid-feedback" id="usernameError"></div>
                    </div>
                    
                    <!-- Email Field -->
                    <div class="mb-3">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="input-group">
                            <span class="form-icon">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" 
                                   class="form-control form-control-with-icon" 
                                   id="email" 
                                   placeholder="Enter your email"
                                   required
                                   autocomplete="email">
                        </div>
                        <div class="invalid-feedback" id="emailError"></div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group">
                            <span class="form-icon">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" 
                                   class="form-control form-control-with-icon" 
                                   id="password" 
                                   placeholder="Create a password"
                                   required
                                   autocomplete="new-password">
                            <button type="button" class="password-toggle" id="togglePassword" title="Toggle password visibility">
                                <i class="bi bi-eye" id="passwordIcon"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="passwordStrengthText"></div>
                        <div class="invalid-feedback" id="passwordError"></div>
                    </div>
                    
                    <!-- Confirm Password Field -->
                    <div class="mb-3">
                        <label class="form-label" for="confirmPassword">Confirm Password</label>
                        <div class="input-group">
                            <span class="form-icon">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" 
                                   class="form-control form-control-with-icon" 
                                   id="confirmPassword" 
                                   placeholder="Confirm your password"
                                   required
                                   autocomplete="new-password">
                            <button type="button" class="password-toggle" id="toggleConfirmPassword" title="Toggle password visibility">
                                <i class="bi bi-eye" id="confirmPasswordIcon"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" id="confirmPasswordError"></div>
                    </div>
                    
                    <!-- Terms Checkbox -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="termsCheck" required>
                        <label class="form-check-label" for="termsCheck">
                            I agree to the <a href="#" onclick="return false;">Terms of Service</a> and <a href="#" onclick="return false;">Privacy Policy</a>
                        </label>
                        <div class="invalid-feedback" id="termsError"></div>
                    </div>
                    
                    <!-- Register Button -->
                    <button type="submit" class="btn btn-primary auth-btn" id="registerBtn">
                        <span class="btn-text">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </span>
                        <span class="spinner-border spinner-border-sm" role="status"></span>
                    </button>
                </form>
            </div>
            
            <!-- Footer -->
            <div class="auth-footer">
                <p class="mb-0">Already have an account? 
                    <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Auth JavaScript -->
    <script src="js/auth.js"></script>
</body>
</html>
